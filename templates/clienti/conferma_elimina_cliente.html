{% extends 'base.html' %}
{% block title %}Elimina Cliente - Apiary{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title"><i class="bi bi-trash me-2 text-danger"></i>Elimina Cliente</h1>
</div>
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger">
      <div class="card-body text-center py-5">
        <i class="bi bi-exclamation-triangle-fill text-danger fs-1 d-block mb-3"></i>
        <h5>Eliminare il cliente <strong>{{ cliente.nome }}</strong>?</h5>
        <p class="text-muted">Le vendite associate non verranno eliminate ma perderanno il collegamento al cliente.</p>
        <div class="d-flex gap-3 justify-content-center mt-4">
          <a href="{% url 'gestione_clienti' %}" class="btn btn-outline-secondary">Annulla</a>
          <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sì, elimina</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
