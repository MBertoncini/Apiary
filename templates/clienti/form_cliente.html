{% extends 'base.html' %}
{% block title %}Modifica Cliente - Apiary{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title"><i class="bi bi-pencil me-2" style="color:var(--honey);"></i>Modifica {{ cliente.nome }}</h1>
  </div>
  <a href="{% url 'gestione_clienti' %}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Indietro
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
          </div>
          {% endfor %}
          <div class="d-flex gap-2 justify-content-end">
            <a href="{% url 'gestione_clienti' %}" class="btn btn-outline-secondary">Annulla</a>
            <button type="submit" class="btn btn-primary">Salva</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
